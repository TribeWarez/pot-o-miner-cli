name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dependencies
        run: |
          command -v bash
          command -v curl
          command -v jq
          command -v python3
          bash --version
      - name: Script syntax and help
        run: |
          chmod +x pot-o-mine
          ./pot-o-mine --help
      - name: Python dashboard import
        run: python3 -c "import ast; ast.parse(open('pot-o-mine-dashboard.py').read())"
